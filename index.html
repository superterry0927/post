<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>萬用線上報名系統</title>
  
  <!-- 載入 Tailwind CSS 樣式引擎 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 【修復重點】：加入 Import Map，告訴瀏覽器 "react" 等同於哪個網址。
       使用 ?external=react 確保所有套件都共用這一個 React 核心，避免 Invalid hook call 錯誤 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?external=react",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react"
      }
    }
  </script>

  <!-- 載入 Babel 即時編譯器 (讓瀏覽器看懂 React JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 確保淡入動畫正常運作 */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-10">
  
  <div id="root"></div>

  <!-- 主程式邏輯區塊 -->
  <script type="text/babel" data-type="module">
    // 【修復重點】：恢復使用簡潔的模組名稱，由上面的 importmap 負責解析實際網址
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Settings, Users, Edit, Trash2, Plus, ArrowLeft, Check, X, LogIn, Lock, FileText, AlertCircle, Clock } from 'lucide-react';
    
    // Firebase 官方靜態 CDN 確保跨瀏覽器相容性
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // ==========================================
    // ⚠️ 請在這裡替換成您專屬的 Firebase 設定！ ⚠️
    // ==========================================
   // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD7CkhiUFfv44GB_4K3_CtGhedlr7ZfE7I",
  authDomain: "post-d1a06.firebaseapp.com",
  projectId: "post-d1a06",
  storageBucket: "post-d1a06.firebasestorage.app",
  messagingSenderId: "806076052846",
  appId: "1:806076052846:web:df9afefb7ee7efbef27d7f",
  measurementId: "G-H4XJ9F8Z15"
};

    // 自動偵測是否已填寫金鑰
    const isFirebaseConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "請貼上您的_apiKey";

    // 初始化 Firebase
    let app, auth, db;
    if (isFirebaseConfigured) {
      try {
          app = initializeApp(firebaseConfig);
          auth = getAuth(app);
          db = getFirestore(app);
      } catch(e) {
          console.error("Firebase 初始化失敗:", e);
      }
    }
    
    // 自訂專案資料夾 ID
    const sysAppId = 'my-custom-form-system';

    // 系統主元件
    function App() {
      // --- 狀態管理 ---
      const [currentView, setCurrentView] = useState('user_home');
      const [toast, setToast] = useState(null);
      const [user, setUser] = useState(null);
      const [successModal, setSuccessModal] = useState(null);
      const [confirmModal, setConfirmModal] = useState(null);

      const [adminPassword, setAdminPassword] = useState('admin888');
      const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
      const [forms, setForms] = useState([]);
      const [editingForm, setEditingForm] = useState(null);
      const [viewingFormId, setViewingFormId] = useState(null);

      const [selectedForm, setSelectedForm] = useState(null);
      const [registrations, setRegistrations] = useState([]);
      const [editingRegistration, setEditingRegistration] = useState(null);

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };
      const generateId = () => Math.random().toString(36).substr(2, 9);
      const navigateTo = (view) => { setCurrentView(view); window.scrollTo(0, 0); };

      // --- Firebase 資料同步 ---
      useEffect(() => {
        if (!isFirebaseConfigured || !auth || !db) return;
        const initAuth = async () => {
          try { await signInAnonymously(auth); } catch (e) { console.error(e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!isFirebaseConfigured || !user || !db) return;
        const formsRef = collection(db, 'artifacts', sysAppId, 'public', 'data', 'forms');
        const unsubForms = onSnapshot(formsRef, (snapshot) => {
          setForms(snapshot.docs.map(doc => doc.data()));
        }, (err) => console.error(err));
        
        const regsRef = collection(db, 'artifacts', sysAppId, 'public', 'data', 'registrations');
        const unsubRegs = onSnapshot(regsRef, (snapshot) => {
          setRegistrations(snapshot.docs.map(doc => doc.data()));
        }, (err) => console.error(err));
        
        return () => { unsubForms(); unsubRegs(); };
      }, [user]);

      // --- 管理員邏輯 ---
      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (e.target.password.value === adminPassword) {
          setIsAdminLoggedIn(true); navigateTo('admin_dashboard'); showToast('登入成功', 'success');
        } else {
          showToast('密碼錯誤', 'error');
        }
      };

      const handleSaveForm = async () => {
        if (!editingForm.title || !editingForm.startTime || !editingForm.endTime) return showToast('請填寫完整基本資料', 'error');
        if (editingForm.questions.find(q => !q.text.trim())) return showToast('所有題目必須填寫內容', 'error');
        
        try {
          if(db && isFirebaseConfigured) {
            await setDoc(doc(db, 'artifacts', sysAppId, 'public', 'data', 'forms', editingForm.id), editingForm);
          } else {
            setForms([...forms.filter(f => f.id !== editingForm.id), editingForm]); // 記憶體 fallback
          }
          showToast('表單已儲存！', 'success');
          navigateTo('admin_dashboard');
        } catch (err) { showToast('儲存失敗', 'error'); }
      };

      const handleDeleteForm = (formId) => {
        setConfirmModal({
          title: '刪除表單',
          message: '確定要刪除嗎？關聯報名資料將一併刪除無法復原。',
          onConfirm: async () => {
            try {
              if(db && isFirebaseConfigured) {
                await deleteDoc(doc(db, 'artifacts', sysAppId, 'public', 'data', 'forms', formId));
                const relatedRegs = registrations.filter(r => r.formId === formId);
                for (const reg of relatedRegs) await deleteDoc(doc(db, 'artifacts', sysAppId, 'public', 'data', 'registrations', reg.id));
              } else {
                setForms(forms.filter(f => f.id !== formId));
              }
              showToast('表單已刪除', 'success');
              setConfirmModal(null);
            } catch (err) { showToast('刪除失敗', 'error'); }
          }
        });
      };

      // --- 使用者邏輯 ---
      const checkFormStatus = (form) => {
        const now = new Date(), start = new Date(form.startTime), end = new Date(form.endTime);
        const currentCount = registrations.filter(r => r.formId === form.id).length;
        if (now < start) return { status: 'not_started', text: '尚未開放', canApply: false };
        if (now > end) return { status: 'ended', text: '已截止', canApply: false };
        if (currentCount >= form.maxParticipants) return { status: 'full', text: '已額滿', canApply: false };
        return { status: 'open', text: '開放報名中', canApply: true };
      };

      const handleSubmitRegistration = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const answers = {}; let hasError = false;
        selectedForm.questions.forEach(q => {
          if (q.type === 'multiple') {
            const values = formData.getAll(q.id); answers[q.id] = values; if (!values.length) hasError = true;
          } else {
            const val = formData.get(q.id); answers[q.id] = val; if (!val?.trim()) hasError = true;
          }
        });

        const editPwd = formData.get('editPassword');
        if (!editPwd || editPwd.trim().length < 4) return showToast('密碼至少4碼', 'error');
        if (hasError) return showToast('請填寫所有題目', 'error');

        const newRegId = generateId().toUpperCase();
        const newReg = { id: newRegId, formId: selectedForm.id, answers, editPassword: editPwd, submittedAt: new Date().toISOString() };

        if(db && isFirebaseConfigured) {
            setDoc(doc(db, 'artifacts', sysAppId, 'public', 'data', 'registrations', newRegId), newReg)
              .then(() => setSuccessModal({ title: '報名成功！', message: '請妥善保存下方序號與自訂密碼。', regId: newRegId }))
              .catch(() => showToast('報名失敗', 'error'));
        } else {
            setRegistrations([...registrations, newReg]);
            setSuccessModal({ title: '報名成功！', message: '請妥善保存下方序號與自訂密碼。(目前為預覽模式，重整後會消失)', regId: newRegId });
        }
      };

      // UI 渲染
      return (
        <div>
          {/* 錯誤警告橫幅 */}
          {!isFirebaseConfigured && (
            <div className="bg-red-600 text-white p-3 text-center font-bold text-sm">
              ⚠️ 系統目前為「單機預覽模式」：您尚未設定 Firebase 金鑰，報名資料無法永久儲存！請依照教學替換 index.html 中的 firebaseConfig。
            </div>
          )}

          {/* 導覽列 */}
          <nav className="bg-slate-900 text-white shadow-md sticky top-0 z-40">
            <div className="max-w-5xl mx-auto px-4 flex justify-between h-16 items-center">
              <div className="flex items-center space-x-2 font-bold text-xl cursor-pointer" onClick={() => navigateTo('user_home')}>
                <FileText className="text-blue-400"/> <span>萬用報名系統</span>
              </div>
              <button onClick={() => isAdminLoggedIn ? navigateTo('admin_dashboard') : navigateTo('admin_login')} className="px-4 py-2 hover:bg-slate-800 rounded-md flex items-center space-x-1">
                <Settings size={16}/> <span>後台管理</span>
              </button>
            </div>
          </nav>

          {/* 提示訊息 */}
          {toast && (
            <div className={`fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-white shadow-xl z-50 flex items-center space-x-2 ${toast.type === 'error' ? 'bg-red-500' : 'bg-green-600'}`}>
              <span>{toast.message}</span>
            </div>
          )}

          {/* 成功 Modal */}
          {successModal && (
             <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex justify-center items-center p-4">
               <div className="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-xl border-t-8 border-blue-500">
                 <h3 className="text-2xl font-bold mb-4">{successModal.title}</h3>
                 <p className="text-gray-600 mb-6">{successModal.message}</p>
                 <div className="bg-blue-50 p-4 rounded-xl mb-6 border border-blue-100">
                   <p className="text-3xl font-mono text-blue-600 font-bold select-all">{successModal.regId}</p>
                 </div>
                 <button onClick={() => { setSuccessModal(null); navigateTo('user_home'); }} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition-colors">確認並返回</button>
               </div>
             </div>
          )}

          {/* 確認 Modal */}
          {confirmModal && (
             <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex justify-center items-center p-4">
               <div className="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-xl border-t-8 border-red-500">
                 <h3 className="text-xl font-bold text-red-600 mb-4">{confirmModal.title}</h3>
                 <p className="mb-6">{confirmModal.message}</p>
                 <div className="flex gap-4">
                   <button onClick={() => setConfirmModal(null)} className="flex-1 bg-gray-100 hover:bg-gray-200 py-3 rounded-xl font-bold transition-colors">取消</button>
                   <button onClick={confirmModal.onConfirm} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold transition-colors">確定執行</button>
                 </div>
               </div>
             </div>
          )}

          {/* 主要內容區 */}
          <main className="max-w-4xl mx-auto mt-8 px-4 animate-fade-in">
            {currentView === 'user_home' && (
              <div className="space-y-6">
                <div className="bg-blue-600 rounded-3xl p-8 md:p-12 text-white shadow-lg flex flex-col md:flex-row justify-between items-center gap-6">
                  <div>
                    <h1 className="text-3xl font-bold mb-2">線上報名服務中心</h1>
                    <p className="opacity-90">瀏覽目前開放的活動並快速完成報名</p>
                  </div>
                </div>
                
                {forms.length === 0 ? (
                  <div className="bg-white p-12 text-center text-gray-400 rounded-2xl border shadow-sm">
                    <p>目前尚無開放中的報名活動</p>
                  </div>
                ) : (
                  forms.map(form => {
                    const status = checkFormStatus(form);
                    return (
                      <div key={form.id} className="bg-white p-6 rounded-2xl shadow-sm border mb-4">
                        <h3 className="text-xl font-bold flex items-center">{form.title} <span className={`text-sm px-3 py-1 rounded-full ml-3 ${status.status === 'open' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}`}>{status.text}</span></h3>
                        <p className="text-sm text-gray-500 mt-2">時間：{form.startTime.replace('T', ' ')} ~ {form.endTime.replace('T', ' ')}</p>
                        <button onClick={() => { setSelectedForm(form); navigateTo('user_form'); }} disabled={!status.canApply} className={`mt-4 w-full py-3 rounded-xl font-bold transition-colors ${status.canApply ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-md' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>前往報名</button>
                      </div>
                    )
                  })
                )}
              </div>
            )}

            {currentView === 'user_form' && selectedForm && (
              <div className="bg-white p-8 rounded-2xl shadow-md border border-gray-100">
                <button onClick={() => navigateTo('user_home')} className="mb-6 text-gray-500 hover:text-gray-800 flex items-center space-x-2 font-medium"><ArrowLeft size={18}/> <span>返回</span></button>
                <h2 className="text-2xl font-bold mb-6 border-b pb-4 text-blue-800">{selectedForm.title} - 填寫報名</h2>
                <form onSubmit={handleSubmitRegistration} className="space-y-6">
                  {selectedForm.questions.map((q, idx) => (
                    <div key={q.id}>
                      <label className="block font-bold mb-2 text-gray-800">{idx + 1}. {q.text}</label>
                      {q.type === 'short' && <input type="text" name={q.id} required className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none bg-gray-50 focus:bg-white transition-all" placeholder="請輸入您的回答" />}
                      {q.type !== 'short' && q.options.map(opt => (
                        <label key={opt} className="flex items-center mt-2 p-3 border border-gray-100 rounded-xl hover:bg-blue-50 cursor-pointer transition-colors bg-white">
                          <input type={q.type === 'single' ? 'radio' : 'checkbox'} name={q.id} value={opt} className="w-5 h-5 mr-3 text-blue-600 border-gray-300 focus:ring-blue-500"/>
                          <span className="font-medium text-gray-700">{opt}</span>
                        </label>
                      ))}
                    </div>
                  ))}
                  <hr className="my-8"/>
                  <div className="bg-blue-50 p-6 rounded-xl border border-blue-100">
                    <label className="block font-bold text-blue-800 mb-2 flex items-center"><Lock size={18} className="mr-2"/> 設定個人編修密碼</label>
                    <p className="text-sm text-blue-600 mb-3">請務必記住此密碼，日後如需修改將需要使用它。</p>
                    <input type="password" name="editPassword" required minLength="4" className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="請輸入至少 4 個字元" />
                  </div>
                  <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-colors text-lg">確認送出報名</button>
                </form>
              </div>
            )}

            {currentView === 'admin_login' && (
              <form onSubmit={handleAdminLogin} className="bg-white p-8 rounded-2xl shadow-md border max-w-sm mx-auto mt-20">
                <div className="flex justify-center mb-4"><div className="bg-purple-100 p-4 rounded-full text-purple-600"><Lock size={32}/></div></div>
                <h2 className="text-xl font-bold text-center mb-6 text-gray-800">後台管理登入</h2>
                <input type="password" name="password" placeholder="預設密碼 admin888" className="w-full border border-gray-300 p-3 rounded-xl mb-6 focus:ring-2 focus:ring-purple-500 focus:outline-none"/>
                <button className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md">登入</button>
              </form>
            )}

            {currentView === 'admin_dashboard' && (
              <div className="space-y-6">
                <div className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border">
                  <h2 className="text-2xl font-bold flex items-center text-gray-800"><Settings className="mr-2 text-purple-600"/> 表單管理</h2>
                  <button onClick={() => { setEditingForm({id: generateId(), title: '', startTime: '', endTime: '', maxParticipants: 50, questions: []}); navigateTo('admin_form_editor'); }} className="mt-4 md:mt-0 bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center transition-colors shadow-md"><Plus size={18} className="mr-1"/> 新增表單</button>
                </div>
                {forms.map(form => (
                  <div key={form.id} className="bg-white p-6 rounded-2xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-4 hover:shadow-md transition-shadow">
                    <div>
                      <span className="font-bold text-xl text-gray-800 block mb-1">{form.title}</span>
                      <span className="text-sm text-gray-500 flex items-center"><Clock size={14} className="mr-1"/> {form.startTime.replace('T', ' ')} ~ {form.endTime.replace('T', ' ')}</span>
                    </div>
                    <button onClick={() => handleDeleteForm(form.id)} className="w-full md:w-auto text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-xl font-bold flex items-center justify-center transition-colors"><Trash2 size={16} className="mr-1"/> 刪除表單</button>
                  </div>
                ))}
              </div>
            )}

            {currentView === 'admin_form_editor' && (
              <div className="bg-white p-8 rounded-2xl shadow-md border border-t-4 border-t-purple-500">
                 <button onClick={() => navigateTo('admin_dashboard')} className="mb-6 text-gray-500 hover:text-gray-800 flex items-center space-x-2 font-medium"><ArrowLeft size={18}/> <span>返回</span></button>
                 <h2 className="text-xl font-bold mb-4 text-gray-800">建立 / 編輯表單</h2>
                 
                 <label className="block text-sm font-bold text-gray-600 mb-1">表單標題</label>
                 <input type="text" placeholder="例如：迎新活動報名" value={editingForm.title} onChange={e => setEditingForm({...editingForm, title: e.target.value})} className="w-full border border-gray-300 p-3 rounded-xl mb-6 text-lg font-bold focus:ring-2 focus:ring-purple-500 focus:outline-none" />
                 
                 <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                   <div>
                     <label className="block text-sm font-bold text-gray-600 mb-1">開始時間</label>
                     <input type="datetime-local" value={editingForm.startTime} onChange={e => setEditingForm({...editingForm, startTime: e.target.value})} className="border border-gray-300 p-3 rounded-xl w-full focus:ring-2 focus:ring-purple-500 focus:outline-none"/>
                   </div>
                   <div>
                     <label className="block text-sm font-bold text-gray-600 mb-1">截止時間</label>
                     <input type="datetime-local" value={editingForm.endTime} onChange={e => setEditingForm({...editingForm, endTime: e.target.value})} className="border border-gray-300 p-3 rounded-xl w-full focus:ring-2 focus:ring-purple-500 focus:outline-none"/>
                   </div>
                 </div>

                 <h3 className="font-bold text-lg mb-4 text-gray-800 border-b pb-2">自訂題目</h3>
                 {editingForm.questions.map((q, idx) => (
                   <div key={q.id} className="bg-gray-50 p-4 rounded-xl mb-4 border border-gray-200">
                     <span className="text-sm font-bold text-purple-600 bg-purple-100 px-2 py-1 rounded-md mb-2 inline-block">題目 {idx + 1} ({q.type === 'short' ? '簡答題' : q.type === 'single' ? '單選題' : '複選題'})</span>
                     <input type="text" placeholder="輸入題目名稱..." value={q.text} onChange={(e) => {
                       const newQs = [...editingForm.questions];
                       newQs[idx].text = e.target.value;
                       setEditingForm({...editingForm, questions: newQs});
                     }} className="w-full border-b-2 border-gray-300 bg-transparent p-2 focus:border-purple-500 focus:outline-none font-medium text-lg"/>
                   </div>
                 ))}

                 <div className="flex flex-wrap gap-2 mb-8 mt-4">
                   <button onClick={() => setEditingForm({...editingForm, questions: [...editingForm.questions, {id: generateId(), type: 'single', text: '', options: ['選項1', '選項2']}]})} className="bg-white border border-purple-200 text-purple-700 px-4 py-2 rounded-xl font-bold flex items-center shadow-sm hover:bg-purple-50"><Plus size={16} className="mr-1"/> 單選題</button>
                   <button onClick={() => setEditingForm({...editingForm, questions: [...editingForm.questions, {id: generateId(), type: 'multiple', text: '', options: ['選項1', '選項2']}]})} className="bg-white border border-purple-200 text-purple-700 px-4 py-2 rounded-xl font-bold flex items-center shadow-sm hover:bg-purple-50"><Plus size={16} className="mr-1"/> 複選題</button>
                   <button onClick={() => setEditingForm({...editingForm, questions: [...editingForm.questions, {id: generateId(), type: 'short', text: ''}]})} className="bg-white border border-purple-200 text-purple-700 px-4 py-2 rounded-xl font-bold flex items-center shadow-sm hover:bg-purple-50"><Plus size={16} className="mr-1"/> 簡答題</button>
                 </div>

                 <button onClick={handleSaveForm} className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl shadow-lg transition-colors text-lg">儲存並發布表單</button>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
